<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adjusta — Heels</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --purple: #7B5EA7;
    --purple-light: #9B7BC4;
    --purple-pale: #EDE8F5;
    --purple-dark: #4A3570;
    --off-white: #FAF9F7;
    --text-dark: #1C1520;
    --text-mid: #6B5A7A;
  }
  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--off-white);
    color: var(--text-dark);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2.5rem;
    border-bottom: 0.5px solid rgba(123,94,167,0.18);
    background: var(--off-white);
    flex-shrink: 0;
    z-index: 10;
  }
  .nav-logo { display: flex; align-items: center; gap: 0.5rem; }
  .nav-logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--purple);
    letter-spacing: 0.04em;
  }
  .nav-links { display: flex; gap: 2.2rem; list-style: none; }
  .nav-links a {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--text-mid);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--purple); }
  .nav-btn {
    background: var(--purple);
    color: #fff;
    border: none;
    padding: 0.5rem 1.4rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: var(--purple-dark); }

  /* MAIN CONTENT */
  .content {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 2rem 2.5rem;
    gap: 2.5rem;
  }

  /* LEFT — FIXED MAIN HEEL */
  .main-heel-col {
    flex-shrink: 0;
    width: 600px;
    display: flex;
    flex-direction: column;
  }
  .main-heel-card {
    background: #fff;
    border: 0.5px solid rgba(123,94,167,0.15);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(123,94,167,0.1);
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .main-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: var(--purple);
    color: #fff;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    z-index: 2;
  }
  .main-img-wrap {
    position: relative;
    flex: 1;
    background: linear-gradient(145deg, #EDE8F5 0%, #D5CBF0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.5rem;
    min-height: 0;
  }
  .placeholder-icon { opacity: 0.28; }
  .placeholder-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--purple);
    opacity: 0.55;
  }
  .main-info {
    padding: 1.2rem 1.4rem 1.4rem;
    border-top: 0.5px solid rgba(123,94,167,0.1);
    flex-shrink: 0;
  }
  .main-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--text-dark);
    margin-bottom: 0.25rem;
  }
  .main-sub {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 0.75rem;
  }
  .main-bottom { display: flex; justify-content: space-between; align-items: center; }
  .main-price {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--purple);
  }
  .swatches { display: flex; gap: 6px; align-items: center; }
  .swatch {
    width: 18px; height: 18px; border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.1);
    cursor: pointer;
  }

  /* RIGHT — SCROLLABLE GRID */
  .more-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .more-header {
    flex-shrink: 0;
    margin-bottom: 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .more-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--text-dark);
  }
  .more-title em { color: var(--purple); font-style: italic; }
  .more-view {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--purple);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    text-decoration: none;
  }
  .more-view::after { content: '→'; }

  .grid-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
    min-height: 0;
  }
  .grid-scroll::-webkit-scrollbar { width: 3px; }
  .grid-scroll::-webkit-scrollbar-track { background: transparent; }
  .grid-scroll::-webkit-scrollbar-thumb { background: rgba(123,94,167,0.3); border-radius: 2px; }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    padding-bottom: 0.5rem;
  }
  .thumb-card {
    background: #fff;
    border: 0.5px solid rgba(123,94,167,0.12);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .thumb-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(123,94,167,0.13);
  }
  .thumb-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb-info { padding: 0.6rem 0.75rem 0.75rem; }
  .thumb-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    color: var(--text-dark);
    margin-bottom: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .thumb-price { font-size: 0.72rem; color: var(--purple); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <svg width="26" height="36" viewBox="0 0 80 80">
      <img src="Src/logo.svg">
    </svg>
    <span class="nav-logo-text">Adjusta</span>
  </div>
  <ul class="nav-links">
    <li><a href="#">Collection</a></li>
    <li><a href="#">New Arrivals</a></li>
    <li><a href="#">Lookbook</a></li>
    <li><a href="#">About</a></li>
  </ul>
  <button class="nav-btn">Shop Now</button>
</nav>

<!-- CONTENT -->
<div class="content">

  <!-- FIXED MAIN HEEL -->
  <div class="main-heel-col">
    <div class="main-heel-card">
      <img src="Src/main-heel.jpeg">
      <div class="main-info">
        <div class="main-name">Main Heel</div>
        <div class="main-sub">Signature Series · Adjustable</div>
        <div class="main-bottom">
          <span class="main-price">₹ 0,000</span>
          <div class="swatches">
            <div class="swatch" style="background:#1C1520;"></div>
            <div class="swatch" style="background:#C9A96E;"></div>
            <div class="swatch" style="background:#7B5EA7;"></div>
            <div class="swatch" style="background:#E8D5D5;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCROLLABLE GRID -->
  <div class="more-col">
    <div class="more-header">
      <h2 class="more-title">More <em>from us</em></h2>
      <a class="more-view" href="#">View All</a>
    </div>
    <div class="grid-scroll">
      <div class="product-grid" id="productGrid"></div>
    </div>
  </div>

</div>

<script>
const products = [
  { name: "The Noir", price: "₹6,499", bg: "linear-gradient(145deg,#EDE8F5,#D5CBF0)" },
  { name: "Velvet Arc", price: "₹5,999", bg: "linear-gradient(145deg,#F0EBF9,#DDD5F0)" },
  { name: "The Serene", price: "₹7,299", bg: "linear-gradient(145deg,#E8E2F4,#CABEe8)" },
  { name: "Golden Hour", price: "₹6,799", bg: "linear-gradient(145deg,#F5F0FA,#E0D6F2)" },
  { name: "Bloom Step", price: "₹5,499", bg: "linear-gradient(145deg,#EDE8F5,#D5CBF0)" },
  { name: "Dusky Rose", price: "₹6,199", bg: "linear-gradient(145deg,#F0EBF9,#DDD5F0)" },
  { name: "The Ember", price: "₹7,099", bg: "linear-gradient(145deg,#E8E2F4,#CABEe8)" },
  { name: "Ivory Poise", price: "₹5,799", bg: "linear-gradient(145deg,#F5F0FA,#E0D6F2)" },
  { name: "Eclipse", price: "₹8,499", bg: "linear-gradient(145deg,#EDE8F5,#D5CBF0)" },
];

const grid = document.getElementById('productGrid');
products.forEach(p => {
  const card = document.createElement('div');
  card.className = 'thumb-card';
  card.innerHTML = `
    <div class="thumb-img" style="background:${p.bg}">
      <svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:0.3">
        <rect x="4" y="10" width="56" height="44" rx="3" stroke="#7B5EA7" stroke-width="2"/>
        <circle cx="21" cy="26" r="7" stroke="#7B5EA7" stroke-width="2"/>
        <path d="M4 44 L17 31 L27 41 L41 27 L60 46" stroke="#7B5EA7" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="thumb-info">
      <div class="thumb-name">${p.name}</div>
      <div class="thumb-price">${p.price}</div>
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
